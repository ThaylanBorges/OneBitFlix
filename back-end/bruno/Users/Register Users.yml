info:
  name: Register Users
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/auth/register"
  body:
    type: json
    data: |-
      {
        "firstName": "Millena",
        "lastName": "Lino",
        "phone": "999999999",
        "birth": "01-24-2004",
        "email": "email-test@test.com",
        "password": "123456"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
