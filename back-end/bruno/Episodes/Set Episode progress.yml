info:
  name: Set Episode progress
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/episodes/:id/watchTime"
  params:
    - name: id
      value: "2"
      type: path
  body:
    type: json
    data: |-
      {
        "seconds": 80
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
